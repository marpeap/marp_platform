<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 800px; height: 450px; overflow: hidden;
  background: #060A14;
}
canvas {
  position: absolute; inset: 0;
  display: block;
}
</style>
</head>
<body>
<canvas id="c" width="1600" height="900"></canvas>
<script>
// ── CONFIG ──────────────────────────────────────────────────────
const frame  = parseInt(new URLSearchParams(location.search).get('frame') || '0');
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 1600, H = 900;
const CX = W / 2, CY = H / 2;
const PI2 = Math.PI * 2;

// deterministic pseudo-random (no Math.random — must be stable per frame)
function hash(n) {
  let x = Math.sin(n + 1) * 43758.5453123;
  return x - Math.floor(x);
}

// ── HELPERS ─────────────────────────────────────────────────────
const sin  = (x) => Math.sin(x);
const cos  = (x) => Math.cos(x);
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function parseHex(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}
function rgba(hex, a) {
  const [r,g,b] = parseHex(hex);
  return `rgba(${r},${g},${b},${a})`;
}

// ── ORBITAL BODIES ───────────────────────────────────────────────
// All periods divide 180 → seamless loop
const bodies = [
  { color: '#4F8AFF', rx: 240, ry: 130, period: 180, phase: 0,           size: 18 }, // M-ONE
  { color: '#5BC4B8', rx: 170, ry: 92,  period:  90, phase: Math.PI/2,   size: 15 }, // M-CAMPAIGN
  { color: '#D4B87A', rx: 300, ry: 162, period: 180, phase: Math.PI,     size: 16 }, // M-CORP
  { color: '#E8924A', rx: 120, ry: 65,  period:  60, phase: 3*Math.PI/2, size: 13 }, // Skill Shop
  { color: '#4CAF7A', rx: 210, ry: 114, period:  90, phase: Math.PI*1.3, size: 14 }, // M-REFER
];

// Compute orb positions
const positions = bodies.map(b => {
  const angle = b.phase + (frame / b.period) * PI2;
  const x = CX + cos(angle) * b.rx;
  const y = CY + sin(angle) * b.ry;
  // depth: sin(angle) > 0 → "behind" → slightly smaller/dimmer
  const depth = 1 - 0.18 * sin(angle);
  return { ...b, x, y, angle, depth };
});

// Global breathing (central orb pulse)
const breathe = 1 + 0.1 * sin(frame / 30 * PI2);

// ── DRAW ────────────────────────────────────────────────────────

// 1. Background
const bgGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, 700);
bgGrad.addColorStop(0,   'rgba(14, 22, 48, 1)');
bgGrad.addColorStop(0.4, 'rgba(8,  13, 28, 1)');
bgGrad.addColorStop(1,   'rgba(4,  7,  16, 1)');
ctx.fillStyle = bgGrad;
ctx.fillRect(0, 0, W, H);

// 2. Starfield — deterministic
ctx.save();
for (let i = 0; i < 220; i++) {
  const sx = hash(i * 7.31) * W;
  const sy = hash(i * 3.97) * H;
  const sz = hash(i * 1.13) * 1.5 + 0.3;
  const twinkle = 0.4 + 0.3 * sin(frame / 40 * PI2 + i * 2.3);
  ctx.beginPath();
  ctx.arc(sx, sy, sz, 0, PI2);
  ctx.fillStyle = `rgba(255,255,255,${twinkle * 0.4})`;
  ctx.fill();
}
ctx.restore();

// 3. Orbital paths — very faint ellipses
ctx.save();
bodies.forEach(b => {
  ctx.beginPath();
  ctx.ellipse(CX, CY, b.rx, b.ry, 0, 0, PI2);
  ctx.strokeStyle = 'rgba(255,255,255,0.028)';
  ctx.lineWidth = 1;
  ctx.stroke();
});
ctx.restore();

// 4. Connection lines (center → each orb)
ctx.save();
positions.forEach((b, i) => {
  const linePulse = 0.1 + 0.06 * sin(frame / 50 * PI2 + i * 1.4);
  const grad = ctx.createLinearGradient(CX, CY, b.x, b.y);
  grad.addColorStop(0, rgba('#D4B87A', linePulse * 1.5));
  grad.addColorStop(1, rgba(b.color, linePulse));
  ctx.beginPath();
  ctx.moveTo(CX, CY);
  ctx.lineTo(b.x, b.y);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1.2;
  ctx.stroke();
});
ctx.restore();

// 5. Cross-connections between closest orb pairs
ctx.save();
const pairs = [[0,1],[1,3],[0,4],[2,4],[1,2]];
pairs.forEach(([i,j], pi) => {
  const a = positions[i], bpos = positions[j];
  const dist = Math.hypot(a.x - bpos.x, a.y - bpos.y);
  if (dist < 350) {
    const fade = clamp(1 - dist / 350, 0, 1);
    const pulse = 0.04 + 0.03 * sin(frame / 60 * PI2 + pi * 2.1);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(bpos.x, bpos.y);
    ctx.strokeStyle = `rgba(255,255,255,${fade * pulse})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
});
ctx.restore();

// 6. Nebula halos behind back-orbs (sorted by depth, draw far ones first)
const sorted = [...positions].sort((a, b) => b.depth - a.depth);

sorted.forEach(b => {
  if (b.depth < 1) {
    // Draw subtle far-glow first
    const glow = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.size * b.depth * 18);
    glow.addColorStop(0,   rgba(b.color, 0.04 * b.depth));
    glow.addColorStop(1,   rgba(b.color, 0));
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size * b.depth * 18, 0, PI2);
    ctx.fill();
  }
});

// 7. Orbiting orbs (rendered in depth order: far → near)
sorted.forEach((b, i) => {
  const pulse = 1 + 0.1 * sin(frame / 45 * PI2 + i * 1.7);
  const s = b.size * b.depth * pulse * 2; // *2 for hi-res canvas
  const alpha = clamp(b.depth * 0.95 + 0.05, 0.7, 1);

  // Outer large glow
  const g1 = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, s * 8);
  g1.addColorStop(0,   rgba(b.color, 0.14 * alpha));
  g1.addColorStop(0.5, rgba(b.color, 0.06 * alpha));
  g1.addColorStop(1,   rgba(b.color, 0));
  ctx.fillStyle = g1;
  ctx.beginPath();
  ctx.arc(b.x, b.y, s * 8, 0, PI2);
  ctx.fill();

  // Mid glow
  const g2 = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, s * 3.5);
  g2.addColorStop(0,   rgba(b.color, 0.55 * alpha));
  g2.addColorStop(0.6, rgba(b.color, 0.2 * alpha));
  g2.addColorStop(1,   rgba(b.color, 0));
  ctx.fillStyle = g2;
  ctx.beginPath();
  ctx.arc(b.x, b.y, s * 3.5, 0, PI2);
  ctx.fill();

  // Core
  const g3 = ctx.createRadialGradient(b.x - s*0.3, b.y - s*0.3, 0, b.x, b.y, s);
  g3.addColorStop(0, `rgba(255,255,255,${0.9 * alpha})`);
  g3.addColorStop(0.4, rgba(b.color, alpha));
  g3.addColorStop(1,   rgba(b.color, 0.2 * alpha));
  ctx.fillStyle = g3;
  ctx.beginPath();
  ctx.arc(b.x, b.y, s, 0, PI2);
  ctx.fill();
});

// 8. Central orb (drawn last — always on top)
const cs = 30 * breathe * 2; // *2 hi-res

// Large ambient glow
const cg0 = ctx.createRadialGradient(CX, CY, 0, CX, CY, cs * 15);
cg0.addColorStop(0,   'rgba(212,184,122,0.08)');
cg0.addColorStop(0.5, 'rgba(212,184,122,0.03)');
cg0.addColorStop(1,   'rgba(212,184,122,0)');
ctx.fillStyle = cg0;
ctx.beginPath();
ctx.arc(CX, CY, cs * 15, 0, PI2);
ctx.fill();

// Mid glow
const cg1 = ctx.createRadialGradient(CX, CY, 0, CX, CY, cs * 5);
cg1.addColorStop(0,   'rgba(255,240,180,0.6)');
cg1.addColorStop(0.4, 'rgba(212,184,122,0.35)');
cg1.addColorStop(1,   'rgba(212,184,122,0)');
ctx.fillStyle = cg1;
ctx.beginPath();
ctx.arc(CX, CY, cs * 5, 0, PI2);
ctx.fill();

// Core sphere
const cg2 = ctx.createRadialGradient(CX - cs*0.3, CY - cs*0.3, 0, CX, CY, cs);
cg2.addColorStop(0,   'rgba(255,252,235,1)');
cg2.addColorStop(0.35,'rgba(255,224,120,1)');
cg2.addColorStop(0.7, 'rgba(212,184,122,1)');
cg2.addColorStop(1,   'rgba(160,120,60,0.8)');
ctx.fillStyle = cg2;
ctx.beginPath();
ctx.arc(CX, CY, cs, 0, PI2);
ctx.fill();

// Specular highlight
const cg3 = ctx.createRadialGradient(CX - cs*0.35, CY - cs*0.35, 0, CX, CY, cs*0.6);
cg3.addColorStop(0, 'rgba(255,255,255,0.55)');
cg3.addColorStop(1, 'rgba(255,255,255,0)');
ctx.fillStyle = cg3;
ctx.beginPath();
ctx.arc(CX, CY, cs, 0, PI2);
ctx.fill();

// 9. Vignette
const vig = ctx.createRadialGradient(CX, CY, H * 0.3, CX, CY, H * 0.85);
vig.addColorStop(0, 'rgba(0,0,0,0)');
vig.addColorStop(1, 'rgba(0,0,0,0.55)');
ctx.fillStyle = vig;
ctx.fillRect(0, 0, W, H);
</script>
</body>
</html>
